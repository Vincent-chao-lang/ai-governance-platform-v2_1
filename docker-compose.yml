services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aigov
    ports:
      - "5432:5432"
    volumes:
      - aigov_pg:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    depends_on:
      - db
    env_file:
      - .env.example
    volumes:
      - ./config:/app/config
    ports:
      - "8000:8000"

volumes:
  aigov_pg:
